<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부트스트랩 맛보기</title>

    <!-- 부트스트랩 CSS 불러오기 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- 네비게이션 바 : class만 붙였을 뿐인데 헤더가 완성돼요 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
      <a class="navbar-brand fw-bold text-success" href="#">Gmarket</a>
      <div class="d-flex gap-3">
        <a href="#" class="text-decoration-none">로그인</a>
        <a href="#" class="text-decoration-none">장바구니</a>
      </div>
    </nav>

    <!-- 버튼 : class 이름만 바꾸면 색이 바뀌어요 -->
    <div class="p-4">
      <button class="btn btn-primary">기본 버튼</button>
      <button class="btn btn-success">초록 버튼</button>
      <button class="btn btn-outline-danger">테두리만 있는 버튼</button>
    </div>

    <!-- 그리드 : css.html에서 만든 card-list(grid)랑 같은 역할, row/col로 나눔 -->
    <div class="container">
      <div class="row g-3">
        <div class="col-4">
          <div class="p-3 bg-light border rounded text-center">카드1</div>
        </div>
        <div class="col-4">
          <div class="p-3 bg-light border rounded text-center">카드2</div>
        </div>
        <div class="col-4">
          <div class="p-3 bg-light border rounded text-center">카드3</div>
        </div>
      </div>
    </div>

    <!-- 그리드 시스템 한눈에 보기 : 한 줄 = 12칸이라는 걸 눈으로 확인 -->
    <div class="container mt-5">
      <h2>그리드 시스템 이해하기 (한 줄 = 12칸)</h2>

      <div class="row g-2 mb-2">
        <div class="col-12">
          <div class="p-3 bg-primary text-white text-center rounded">col-12 (한 칸이 12칸 전부)</div>
        </div>
      </div>

      <div class="row g-2 mb-2">
        <div class="col-6">
          <div class="p-3 bg-success text-white text-center rounded">col-6</div>
        </div>
        <div class="col-6">
          <div class="p-3 bg-success text-white text-center rounded">col-6</div>
        </div>
      </div>

      <div class="row g-2 mb-2">
        <div class="col-4">
          <div class="p-3 bg-warning text-center rounded">col-4</div>
        </div>
        <div class="col-4">
          <div class="p-3 bg-warning text-center rounded">col-4</div>
        </div>
        <div class="col-4">
          <div class="p-3 bg-warning text-center rounded">col-4</div>
        </div>
      </div>

      <div class="row g-2 mb-2">
        <div class="col-3">
          <div class="p-3 bg-danger text-white text-center rounded">col-3</div>
        </div>
        <div class="col-3">
          <div class="p-3 bg-danger text-white text-center rounded">col-3</div>
        </div>
        <div class="col-3">
          <div class="p-3 bg-danger text-white text-center rounded">col-3</div>
        </div>
        <div class="col-3">
          <div class="p-3 bg-danger text-white text-center rounded">col-3</div>
        </div>
      </div>

      <div class="row g-2 mb-2">
        <div class="col-8">
          <div class="p-3 bg-info text-center rounded">col-8 (넓게)</div>
        </div>
        <div class="col-4">
          <div class="p-3 bg-info text-center rounded">col-4 (좁게)</div>
        </div>
      </div>
    </div>

    <!-- 아코디언 : 클릭하면 펼쳐지고 닫히는 목록 -->
    <div class="container mt-5 mb-5">
      <h2>아코디언</h2>

      <div class="accordion" id="myAccordion">
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button
              class="accordion-button"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#item1"
            >
              배송은 얼마나 걸리나요?
            </button>
          </h2>
          <div
            id="item1"
            class="accordion-collapse collapse show"
            data-bs-parent="#myAccordion"
          >
            <div class="accordion-body">보통 1~2일 안에 도착해요.</div>
          </div>
        </div>

        <div class="accordion-item">
          <h2 class="accordion-header">
            <button
              class="accordion-button collapsed"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#item2"
            >
              교환/환불은 어떻게 하나요?
            </button>
          </h2>
          <div
            id="item2"
            class="accordion-collapse collapse"
            data-bs-parent="#myAccordion"
          >
            <div class="accordion-body">
              고객센터 - 교환/환불 신청 메뉴에서 접수할 수 있어요.
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <h2 class="accordion-header">
            <button
              class="accordion-button collapsed"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#item3"
            >
              회원가입은 무료인가요?
            </button>
          </h2>
          <div
            id="item3"
            class="accordion-collapse collapse"
            data-bs-parent="#myAccordion"
          >
            <div class="accordion-body">네, 회원가입과 이용은 모두 무료예요.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 아코디언 클릭 동작(펼치기/접기)을 위해 부트스트랩 JS도 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
