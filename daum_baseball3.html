<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBO 야구 순위</title>
    <style>
      /* 표 구조 연습용: 태그마다 테두리 색이 다릅니다. */
      table {
        border-collapse: collapse;
        width: 100%;
        border: 5px solid #7c3aed;
      }
      thead {
        outline: 4px solid #2563eb;
        outline-offset: -4px;
      }
      tbody {
        outline: 4px solid #16a34a;
        outline-offset: -4px;
      }
      tr {
        outline: 2px dashed #f59e0b;
        outline-offset: -2px;
      }
      th {
        border: 3px solid #dc2626;
        padding: 8px 12px;
        text-align: center;
        background-color: #f0f0f0;
      }
      td {
        border: 2px solid #06b6d4;
        padding: 8px 12px;
        text-align: center;
      }
      .tag-guide {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }
      .tag-guide span {
        padding: 5px 9px;
        border: 3px solid;
        border-radius: 5px;
        font-family: monospace;
        font-weight: bold;
        background: white;
        cursor: pointer;
        user-select: none;
      }
      .tag-guide span:focus-visible {
        outline: 3px solid #111;
        outline-offset: 2px;
      }
      .tag-guide span.is-off {
        opacity: 0.4;
        text-decoration: line-through;
      }
      .table-guide { border-color: #7c3aed !important; }
      .thead-guide { border-color: #2563eb !important; }
      .tbody-guide { border-color: #16a34a !important; }
      .tr-guide { border-color: #f59e0b !important; border-style: dashed !important; }
      .th-guide { border-color: #dc2626 !important; }
      .td-guide { border-color: #06b6d4 !important; }
      body.hide-table-border table { border-width: 0; }
      body.hide-thead-border thead { outline-color: transparent; }
      body.hide-tbody-border tbody { outline-color: transparent; }
      body.hide-tr-border tr { outline-color: transparent; }
      body.hide-th-border th { border-color: transparent; }
      body.hide-td-border td { border-color: transparent; }
    </style>
  </head>
  <body>
    <h1>KBO 야구 순위</h1>

    <div class="tag-guide">
      <span class="table-guide" role="button" tabindex="0" aria-pressed="true" data-toggle-class="hide-table-border">&lt;table&gt;</span>
      <span class="thead-guide" role="button" tabindex="0" aria-pressed="true" data-toggle-class="hide-thead-border">&lt;thead&gt;</span>
      <span class="tbody-guide" role="button" tabindex="0" aria-pressed="true" data-toggle-class="hide-tbody-border">&lt;tbody&gt;</span>
      <span class="tr-guide" role="button" tabindex="0" aria-pressed="true" data-toggle-class="hide-tr-border">&lt;tr&gt;</span>
      <span class="th-guide" role="button" tabindex="0" aria-pressed="true" data-toggle-class="hide-th-border">&lt;th&gt;</span>
      <span class="td-guide" role="button" tabindex="0" aria-pressed="true" data-toggle-class="hide-td-border">&lt;td&gt;</span>
    </div>

    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>팀명</th>
          <th>경기</th>
          <th>승</th>
          <th>무</th>
          <th>패</th>
          <th>승률</th>
          <th>게임차</th>
          <th>연속</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>

    <script>
      const guideButtons = document.querySelectorAll(".tag-guide span");

      function toggleBorder(guideButton) {
        const borderClass = guideButton.dataset.toggleClass;
        const borderIsVisible = !document.body.classList.toggle(borderClass);

        guideButton.classList.toggle("is-off", !borderIsVisible);
        guideButton.setAttribute("aria-pressed", String(borderIsVisible));
      }

      for (const guideButton of guideButtons) {
        guideButton.addEventListener("click", function () {
          toggleBorder(guideButton);
        });

        guideButton.addEventListener("keydown", function (event) {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            toggleBorder(guideButton);
          }
        });
      }

      fetch("baseball_ranking.json")
        .then(function (res) {
          return res.json();
        })
        .then(function (data) {
          let rows = "";
          for (const team of data.list) {
            rows += `
              <tr>
                <td>${team.rank.rank}</td>
                <td>${team.nameKo}</td>
                <td>${team.rank.game}</td>
                <td>${team.rank.win}</td>
                <td>${team.rank.draw}</td>
                <td>${team.rank.loss}</td>
                <td>${team.rank.wpct}</td>
                <td>${team.rank.gb}</td>
                <td>${team.rank.streak}</td>
              </tr>
            `;
          }
          document.getElementById("rankBody").innerHTML = rows;
        })
        .catch(function (error) {
          console.error("순위 데이터를 가져오는 데 실패했습니다.", error);
        });
    </script>
  </body>
</html>
