<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* a 태그에 마우스 올렸을 때 */
      a:hover {
        color: rgb(0, 255, 21);
      }

      /* 리스트의 첫 번째 아이템 */
      li:first-child {
        font-weight: bold;
      }

      /* p 태그의 첫 글자 */
      p::first-letter {
        font-size: 200%;
      }

      /* p 태그의 첫 줄 */
      p::first-line {
        color: red;
      }

      /* 카드 리스트를 3열 그리드로 배치 */
      .card-list {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1px;
        background-color: aquamarine;
      }

      .card {
        padding: 16px;
        border: 1px solid #ccc;
        border-radius: 8px;
        text-align: center;
        background-color: lightblue;
      }
    </style>
  </head>
  <body>
    <a href="https://www.naver.com" target="_blank">네이버</a>
    <ul>
      <li>리스트1</li>
      <li>리스트2</li>
      <li>리스트3</li>
    </ul>
    <p>
      안녕하세요. 저는 HTML입니다. HTML은 Hyper Text Markup Language의
      약자입니다.
    </p>
    <p>
      안녕하세요. 저는 HTML입니다. HTML은 Hyper Text Markup Language의
      약자입니다.
    </p>
    <p>
      안녕하세요. 저는 HTML입니다. HTML은 Hyper Text Markup Language의
      약자입니다.
    </p>

    <div class="card-list">
      <div class="card">카드1</div>
      <div class="card">카드2</div>
      <div class="card">카드3</div>
      <div class="card">카드4</div>
      <div class="card">카드5</div>
      <div class="card">카드6</div>
    </div>
  </body>
</html>
